# 每周自动整理新 star 到对应分类列表中

name: 🤖 Auto-Sort GitHub Stars

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  sort-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Sort unclassified stars
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, time, tempfile, urllib.request, urllib.error

          TOKEN = os.environ["GH_PAT"]
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gql(query, variables=None):
              """Run a GraphQL query, return parsed JSON."""
              body = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request("https://api.github.com/graphql", data=body, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode()
                  print(f"  GraphQL HTTP {e.code}: {err_body[:300]}")
                  return {"error": err_body}
              if "errors" in data:
                  print(f"  GraphQL error: {json.dumps(data['errors'])[:300]}")
              return data

          # ── 获取列表 ──
          print("📋 获取列表...")
          lists_data = gql("query { viewer { lists(first: 20) { nodes { id name items(first: 100) { nodes { id } } } } } }")
          if "error" in lists_data or "data" not in lists_data:
              print(f"❌ 获取列表失败")
              sys.exit(1)

          list_map = {}
          classified_ids = set()
          for lst in lists_data["data"]["viewer"]["lists"]["nodes"]:
              list_map[lst["name"]] = lst["id"]
              for item in lst["items"]["nodes"]:
                  classified_ids.add(item["id"])
          print(f"   {len(list_map)} 个列表, {len(classified_ids)} 个已分类")

          # ── 获取最新 star ──
          print("⭐ 获取最新 star...")
          # Use REST API for pagination
          starred = []
          page = 1
          while page <= 3:
              url = f"https://api.github.com/user/starred?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      batch = json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"  Star API HTTP {e.code}: {e.read().decode()[:200]}")
                  break
              if not batch:
                  break
              starred.extend(batch)
              page += 1
              time.sleep(0.5)

          # Need node_id from GraphQL
          if starred:
              # Build bulk GraphQL query for node IDs of unclassified only
              names = [r["full_name"] for r in starred]
              aliases = []
              for i, fn in enumerate(names):
                  owner, name = fn.split("/")
                  aliases.append(f'r{i}: repository(owner: "{owner}", name: "{name}") {{ id }}')

              node_ids = {}
              for bs in range(0, len(aliases), 50):
                  batch_query = "query {\n" + "\n".join(aliases[bs:bs+50]) + "\n}"
                  data = gql(batch_query)
                  if "data" in data:
                      for j in range(bs, min(bs+50, len(names))):
                          node_id = data["data"].get(f"r{j}", {}).get("id")
                          if node_id:
                              node_ids[names[j]] = node_id
                  time.sleep(0.3)

              new_repos = []
              for r in starred:
                  fn = r["full_name"]
                  nid = node_ids.get(fn)
                  if nid and nid not in classified_ids:
                      new_repos.append({
                          "full_name": fn,
                          "node_id": nid,
                          "description": r.get("description", ""),
                          "language": r.get("language", ""),
                      })
          else:
              new_repos = []

          if not new_repos:
              print("✅ 所有 star 已分类，无需整理")
              sys.exit(0)

          print(f"🔍 {len(new_repos)} 个未分类:")
          for r in new_repos:
              print(f"  • {r['full_name']}")

          # ── 分类 ──
          def classify(repo):
              name = (repo.get("full_name") or "").lower()
              desc = (repo.get("description") or "").lower()
              lang = (repo.get("language") or "").lower()
              combined = f"{name} {desc} {lang}"

              if any(k in name for k in ["skill", "superpowers", "agent-md", "pua", "gstack"]):
                  if not any(b in combined for b in ["proxy","2api","agent hub","harness framework"]):
                      return "🦞 Claude Code 技能"
              if any(k in combined for k in ["agent framework", "multi-agent", "agent harness", "orchestration", "openclaw", "bmad"]):
                  return "🤖 AI Agent 与编排"
              if any(k in combined for k in ["2api", "proxy", "api gateway", "account pool", "reverse", "mirror"]):
                  return "🔧 API 代理与逆向"
              if any(k in combined for k in ["design", "ui library", "component library", "shadcn", "tailwind", "frontend", "css"]):
                  return "🎨 设计与前端"
              if any(k in combined for k in ["llm", "deep learning", "tutorial", "paper", "course", "transformer", "fine-tun"]):
                  return "🧠 AI/ML 学习"
              if any(k in combined for k in ["ppt", "slide", "presentation", "video", "seo", "content"]):
                  return "📽️ 幻灯片与内容生成"
              if any(k in combined for k in ["chatbot", "bot", "im", "telegram", "qq", "wechat", "discord"]):
                  return "💬 聊天机器人"
              if any(k in combined for k in ["blog", "cms", "hugo", "hexo", "resume", "cv"]):
                  return "📝 博客与文档"
              if any(k in combined for k in ["memory", "rag", "vector database", "knowledge graph", "context"]):
                  return "🧩 AI 记忆与上下文"
              return "🛠️ 开发工具"

          # ── 添加到列表 ──
          success = 0
          for repo in new_repos:
              category = classify(repo)
              lid = list_map.get(category)
              if not lid:
                  print(f"  ⚠️  {repo['full_name']} → {category} (无列表)")
                  continue

              mutation = "mutation($item: ID!, $lists: [ID!]!) { updateUserListsForItem(input: {itemId: $item, listIds: $lists}) { clientMutationId } }"
              result = gql(mutation, {"item": repo["node_id"], "lists": [lid]})
              if "data" in result and "errors" not in result:
                  success += 1
                  print(f"  ✅ {repo['full_name']} → {category}")
              else:
                  print(f"  ❌ {repo['full_name']} 失败")
              time.sleep(0.15)

          print(f"\n🎉 {success}/{len(new_repos)} 已整理")
          PYEOF
