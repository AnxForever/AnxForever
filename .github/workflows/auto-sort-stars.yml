# .github/workflows/auto-sort-stars.yml
# 每周自动整理新 star 到对应分类列表中

name: 🤖 Auto-Sort GitHub Stars

on:
  schedule:
    # 每周日 UTC 0 点 (北京时间周日上午 8 点)
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sort-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Fetch unclassified stars and sort
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, time, tempfile, os

          # ── 获取已有的列表及其中的 repo ──
          lists_result = subprocess.run(
              ["gh", "api", "graphql", "-f", "query=query { viewer { lists(first: 20) { nodes { id name items(first: 100) { nodes { id } } } } } }"],
              capture_output=True, text=True,
          )
          try:
              lists_data = json.loads(lists_result.stdout)
          except json.JSONDecodeError:
              print(f"❌ 列表查询失败:\nstdout: {lists_result.stdout[:500]}\nstderr: {lists_result.stderr[:500]}")
              sys.exit(1)

          list_map = {}
          classified_ids = set()

          for lst in lists_data["data"]["viewer"]["lists"]["nodes"]:
              list_map[lst["name"]] = lst["id"]
              for item in lst["items"]["nodes"]:
                  classified_ids.add(item["id"])

          print(f"📋 {len(list_map)} 个列表, {len(classified_ids)} 个已分类 repo")

          # ── 获取最新 50 个 star（GraphQL，带 node_id）──
          stars_gql = '''
          query($after: String) {
            viewer {
              starredRepositories(first: 50, after: $after, orderBy: {field: STARRED_AT, direction: DESC}) {
                nodes { id nameWithOwner description primaryLanguage { name } }
                totalCount
                pageInfo { endCursor hasNextPage }
              }
            }
          }
          '''
          stars_result = subprocess.run(
              ["gh", "api", "graphql", "-f", f"query={stars_gql}", "-f", "after="],
              capture_output=True, text=True,
          )
          try:
              stars_data = json.loads(stars_result.stdout)
          except json.JSONDecodeError:
              print(f"❌ Star 查询失败:\nstdout: {stars_result.stdout[:500]}\nstderr: {stars_result.stderr[:500]}")
              sys.exit(1)

          if "data" not in stars_data:
              print(f"❌ API 返回异常: {json.dumps(stars_data)[:500]}")
              sys.exit(1)
          starred = stars_data["data"]["viewer"]["starredRepositories"]["nodes"]

          new_repos = []
          for r in starred:
              if r["id"] not in classified_ids:
                  new_repos.append({
                      "full_name": r["nameWithOwner"],
                      "node_id": r["id"],
                      "description": r.get("description", ""),
                      "language": r.get("primaryLanguage", {}).get("name", "") if r.get("primaryLanguage") else "",
                  })

          if not new_repos:
              print("✅ 所有 star 已分类，无需整理")
              sys.exit(0)

          print(f"🔍 {len(new_repos)} 个未分类:")
          for r in new_repos:
              print(f"  • {r['full_name']}")

          # ── 分类 ──
          def classify(repo):
              name = (repo.get("full_name") or "").lower()
              desc = (repo.get("description") or "").lower()
              lang = (repo.get("language") or "").lower()
              combined = f"{name} {desc} {lang}"

              if any(k in name for k in ["skill", "superpowers", "agent-md", "pua", "gstack"]):
                  if not any(b in combined for b in ["proxy","2api","agent hub","harness framework"]):
                      return "🦞 Claude Code 技能"
              if any(k in combined for k in ["agent framework", "multi-agent", "agent harness", "orchestration", "openclaw", "bmad"]):
                  return "🤖 AI Agent 与编排"
              if any(k in combined for k in ["2api", "proxy", "api gateway", "account pool", "reverse", "mirror"]):
                  return "🔧 API 代理与逆向"
              if any(k in combined for k in ["design", "ui library", "component library", "shadcn", "tailwind", "frontend", "css"]):
                  return "🎨 设计与前端"
              if any(k in combined for k in ["llm", "deep learning", "tutorial", "paper", "course", "transformer", "fine-tun"]):
                  return "🧠 AI/ML 学习"
              if any(k in combined for k in ["ppt", "slide", "presentation", "video", "seo", "content"]):
                  return "📽️ 幻灯片与内容生成"
              if any(k in combined for k in ["chatbot", "bot", "im", "telegram", "qq", "wechat", "discord"]):
                  return "💬 聊天机器人"
              if any(k in combined for k in ["blog", "cms", "hugo", "hexo", "resume", "cv"]):
                  return "📝 博客与文档"
              if any(k in combined for k in ["memory", "rag", "vector database", "knowledge graph", "context"]):
                  return "🧩 AI 记忆与上下文"
              return "🛠️ 开发工具"

          # ── 添加到列表 ──
          success = 0
          for repo in new_repos:
              category = classify(repo)
              lid = list_map.get(category)
              if not lid:
                  print(f"  ⚠️  {repo['full_name']} → {category} (无列表)")
                  continue

              payload = {
                  "query": "mutation($item: ID!, $lists: [ID!]!) { updateUserListsForItem(input: {itemId: $item, listIds: $lists}) { clientMutationId } }",
                  "variables": {"item": repo["node_id"], "lists": [lid]}
              }

              fd, tmpfile = tempfile.mkstemp(suffix=".json")
              with os.fdopen(fd, 'w') as f:
                  json.dump(payload, f)

              result = subprocess.run(["gh", "api", "graphql", "--input", tmpfile], capture_output=True, text=True)
              os.unlink(tmpfile)

              if result.returncode == 0:
                  success += 1
                  print(f"  ✅ {repo['full_name']} → {category}")
              else:
                  print(f"  ❌ {repo['full_name']} 失败: {result.stderr[:80]}")
              time.sleep(0.15)

          print(f"\n🎉 {success}/{len(new_repos)} 已整理")
          PYEOF
