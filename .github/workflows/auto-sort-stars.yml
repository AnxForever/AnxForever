# 每周自动整理新 star 到对应分类列表中

name: 🤖 Auto-Sort GitHub Stars

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  sort-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Sort unclassified stars
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, time, tempfile, urllib.request, urllib.error

          TOKEN = os.environ["GH_PAT"]
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def gql(query, variables=None):
              """Run a GraphQL query, return parsed JSON."""
              body = json.dumps({"query": query, "variables": variables or {}}).encode()
              req = urllib.request.Request("https://api.github.com/graphql", data=body, headers=HEADERS, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode()
                  print(f"  GraphQL HTTP {e.code}: {err_body[:300]}")
                  return {"error": err_body}
              if "errors" in data:
                  print(f"  GraphQL error: {json.dumps(data['errors'])[:300]}")
              return data

          # ── 获取列表 ──
          print("📋 获取列表...")
          lists_data = gql("query { viewer { lists(first: 20) { nodes { id name items(first: 100) { nodes { ... on Repository { id } } } } } } }")
          if "error" in lists_data or "data" not in lists_data:
              print(f"❌ 获取列表失败")
              sys.exit(1)

          list_map = {}
          classified_ids = set()
          for lst in lists_data["data"]["viewer"]["lists"]["nodes"]:
              list_map[lst["name"]] = lst["id"]
              for item in lst["items"]["nodes"]:
                  classified_ids.add(item["id"])
          print(f"   {len(list_map)} 个列表, {len(classified_ids)} 个已分类")

          # ── 获取最新 star ──
          print("⭐ 获取最新 star...")
          # Use REST API for pagination
          starred = []
          page = 1
          while page <= 3:
              url = f"https://api.github.com/user/starred?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=HEADERS)
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      batch = json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"  Star API HTTP {e.code}: {e.read().decode()[:200]}")
                  break
              if not batch:
                  break
              starred.extend(batch)
              page += 1
              time.sleep(0.5)

          # Need node_id + README from GraphQL
          if starred:
              names = [r["full_name"] for r in starred]
              aliases = []
              for i, fn in enumerate(names):
                  owner, name = fn.split("/")
                  aliases.append(
                      f'r{i}: repository(owner: "{owner}", name: "{name}") {{'
                      f'  id description primaryLanguage {{ name }}'
                      f'  repositoryTopics(first: 10) {{ nodes {{ topic {{ name }} }} }}'
                      f'  object(expression: "HEAD:README.md") {{ ... on Blob {{ text }} }}'
                      f'}}'
                  )

              enriched = {}
              for bs in range(0, len(aliases), 20):
                  batch_query = "query {\n" + "\n".join(aliases[bs:bs+20]) + "\n}"
                  data = gql(batch_query)
                  if "data" in data:
                      for j in range(bs, min(bs+20, len(names))):
                          enriched[names[j]] = data["data"].get(f"r{j}")
                  time.sleep(0.5)

              new_repos = []
              for r in starred:
                  fn = r["full_name"]
                  info = enriched.get(fn)
                  if not info or not info.get("id"):
                      continue
                  nid = info["id"]
                  if nid in classified_ids:
                      continue

                  desc = info.get("description") or r.get("description", "")
                  lang = (info.get("primaryLanguage") or {}).get("name", "") or r.get("language", "")
                  topics = [t["topic"]["name"] for t in ((info.get("repositoryTopics") or {}).get("nodes") or [])]
                  readme_obj = info.get("object") or {}
                  readme = (readme_obj.get("text") or "")[:500]

                  new_repos.append({
                      "full_name": fn,
                      "node_id": nid,
                      "description": desc,
                      "language": lang,
                      "topics": topics,
                      "readme": readme,
                  })
          else:
              new_repos = []

          if not new_repos:
              print("✅ 所有 star 已分类，无需整理")
              sys.exit(0)

          print(f"🔍 {len(new_repos)} 个未分类:")
          for r in new_repos:
              print(f"  • {r['full_name']}")

          # ── 分类（基于 README + 描述 + 话题）──
          def classify(repo):
              name = (repo.get("full_name") or "").lower()
              desc = (repo.get("description") or "").lower()
              lang = (repo.get("language") or "").lower()
              topics_str = " ".join(repo.get("topics") or []).lower()
              readme = (repo.get("readme") or "").lower()
              combined = f"{name} {desc} {lang} {topics_str} {readme[:500]}"

              # ========== Claude Code 技能 ==========
              # Strong signals: skill name patterns, agent-format skill repos
              if any(k in name for k in ["-skill", "skill-", "skills", "superpowers", "agent-md", "pua", "gstack"]):
                  if not any(b in combined for b in ["proxy", "2api", "agent hub", "harness framework", "orchestrat"]):
                      return "🦞 Claude Code 技能"
              if any(k in combined for k in ["claude code skill", "codex skill", "agent skill", "ai agent skill",
                                              "agent skills framework", "claude code plugin", "skill for claude"]):
                  return "🦞 Claude Code 技能"
              if any(k in combined for k in ["claude code", "codex cli", "coding agent"]) and "skill" in combined:
                  return "🦞 Claude Code 技能"

              # ========== AI Agent 与编排 ==========
              if any(k in combined for k in ["agent framework", "multi-agent", "agent harness", "agent orchestration",
                                              "openclaw", "hermes agent", "coding agents", "bmad method",
                                              "coordinate your coding agents", "army of claude", "agent hub",
                                              "personal ai assistant", "multiple agents", "parallel flow"]):
                  return "🤖 AI Agent 与编排"
              if any(k in name for k in ["lambchat", "oh-my-openagent", "ensoai"]):
                  return "🤖 AI Agent 与编排"

              # ========== API 代理与逆向 ==========
              if any(k in combined for k in ["2api", "api proxy", "api gateway", "account pool", "账号池",
                                              "openai 兼容", "anthropic 兼容", "openai format",
                                              "subscription", "grok mirror", "cc-switch", "cc-helper",
                                              "account manager", "quota", "byok", "buildid", "nexos2api",
                                              "relay", "pool proxy", "号池", "多账号"]):
                  return "🔧 API 代理与逆向"
              if any(k in name for k in ["cockpit-tools", "windsurfpoolapi", "windsurf-manager", "chatgpt2api",
                                         "freebuff2api", "flow2api", "ccometixline", "all-api-hub", "sub2api",
                                         "cliproxyapi"]):
                  return "🔧 API 代理与逆向"

              # ========== 设计与前端 ==========
              if any(k in combined for k in ["design system", "ui library", "component library", "shadcn",
                                              "tailwind css", "ui kit", "design language", "design tool",
                                              "open design", "awesome-design", "design engineering",
                                              "component kit", "react ui", "design.md"]):
                  return "🎨 设计与前端"
              if any(k in name for k in ["heroui", "cult-ui", "animal-island", "liquid-glass", "shadcn-admin",
                                         "markdownview", "tegaki", "blossom", "marknative", "kami"]):
                  return "🎨 设计与前端"

              # ========== AI/ML 学习 ==========
              if any(k in combined for k in ["deep learning", "llm tutorial", "paper implement", "transformer",
                                              "fine-tun", "llm 教程", "大模型", "vibe coding",
                                              "nano gpt", "timesfm", "cookbook", "insightface",
                                              "ai engineering interview", "tts model", "speech model",
                                              "text-to-speech", "语音合成", "fish speech"]):
                  return "🧠 AI/ML 学习"
              if any(k in name for k in ["build-nanogpt", "self-llm", "happy-llm", "misotts", "fish-speech",
                                         "annotated_deep_learning", "msa"]):
                  return "🧠 AI/ML 学习"

              # ========== 幻灯片与内容生成 ==========
              if any(k in combined for k in ["ppt", "slide deck", "presentation", "powerpoint", "视频",
                                              "manim", "remotion", "seo skill", "geo content",
                                              "content automation", "google ads", "meta ads"]):
                  return "📽️ 幻灯片与内容生成"
              if any(k in name for k in ["ppt-master", "starry-slides", "guizang-ppt", "geopflow",
                                         "manimcat", "frontend-slides", "gordenppt", "notfair"]):
                  return "📽️ 幻灯片与内容生成"

              # ========== 聊天机器人 ==========
              if any(k in combined for k in ["chatbot", "im platform", "qq bot", "telegram bot", "discord bot",
                                              "companion", "情感陪伴", "ai twin", "digital avatar",
                                              "opinion analysis", "舆情"]):
                  return "💬 聊天机器人"
              if any(k in name for k in ["astrbot", "rikkahub", "kourichat", "weclone", "bettafish"]):
                  return "💬 聊天机器人"

              # ========== 博客与文档 ==========
              if any(k in combined for k in ["blog framework", "static site", "hugo", "hexo",
                                              "resume builder", "cv template", "树莓派文档",
                                              "material design blog", "note sync", "obsidian"]):
                  return "📝 博客与文档"
              if any(k in name for k in ["yamlresume", "magic-resume", "pidoc-site", "2025-blog", "mizuki",
                                         "obsidian-fast-note"]):
                  return "📝 博客与文档"

              # ========== AI 记忆与上下文 ==========
              if any(k in combined for k in ["memory layer", "context database", "context engineering",
                                              "vector database", "knowledge graph", "rag",
                                              "long-term memory", "memory os", "memory palace",
                                              "harness performance"]):
                  return "🧩 AI 记忆与上下文"
              if any(k in name for k in ["cloudmind", "openviking", "zvec", "engram", "memory-palace"]):
                  return "🧩 AI 记忆与上下文"

              # ========== 兜底 ==========
              if lang in ["typescript", "javascript", "go", "rust", "python", "shell"]:
                  return "🛠️ 开发工具"
              return "🛠️ 开发工具"

          # ── 添加到列表 ──
          success = 0
          for repo in new_repos:
              category = classify(repo)
              lid = list_map.get(category)
              if not lid:
                  print(f"  ⚠️  {repo['full_name']} → {category} (无列表)")
                  continue

              mutation = "mutation($item: ID!, $lists: [ID!]!) { updateUserListsForItem(input: {itemId: $item, listIds: $lists}) { clientMutationId } }"
              result = gql(mutation, {"item": repo["node_id"], "lists": [lid]})
              if "data" in result and "errors" not in result:
                  success += 1
                  print(f"  ✅ {repo['full_name']} → {category}")
              else:
                  print(f"  ❌ {repo['full_name']} 失败")
              time.sleep(0.15)

          print(f"\n🎉 {success}/{len(new_repos)} 已整理")
          PYEOF
